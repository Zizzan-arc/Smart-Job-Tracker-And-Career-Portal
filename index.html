<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Applicant Login — JobPortal</title>
  <meta name="description" content="Sign in to your JobPortal applicant account to browse and apply for jobs." />

  <!-- Tailwind CSS + DaisyUI via CDN -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        },
      },
    };
  </script> -->



</head>

<body class="gradient-bg min-h-screen font-sans flex items-center justify-center p-4 relative overflow-hidden">

  <!-- Decorative background blobs -->
  <div class="blob w-72 h-72 bg-indigo-500 -top-20 -left-20 float-anim" style="animation-delay:0s;"></div>
  <div class="blob w-96 h-96 bg-purple-600 bottom-0 right-0 float-anim" style="animation-delay:3s;"></div>
  <div class="blob w-64 h-64 bg-cyan-400 top-1/3 right-1/4 float-anim" style="animation-delay:1.5s;"></div>

  <!-- ==================== LOGIN CARD ==================== -->
  <main class="w-full max-w-md z-10">
    <div
      class="card-glass rounded-2xl shadow-2xl p-8 sm:p-10 transition-all duration-500 hover:shadow-indigo-500/10 hover:shadow-3xl">

      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-2xl sm:text-3xl font-extrabold text-white tracking-tight">Welcome Back</h1>
        <p class="text-slate-400 mt-1 text-sm">Sign in to your account</p>
      </div>

      <!-- ========== Sign-in Form ========== -->
      <!-- this (action tag) helps to send the data to database, basically links database to frontend -->
      <form id="loginForm" action="/Jobportal/login_process.php" method="POST" class="space-y-5" novalidate>

        <!-- Email Field -->
        <div class="form-control w-full">

          <span class="label-text text-slate-300 font-medium text-sm">Email Address</span>

          <div class="relative input-glow rounded-lg">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-500" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M16 12H8m8 0l-4-4m4 4l-4 4M21 12A9 9 0 113 12a9 9 0 0118 0z" />
              </svg>
            </span>
            <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email"
              class="input input-bordered w-full pl-10 bg-slate-800/60 border-slate-700 text-white placeholder:text-slate-500 focus:outline-none transition-colors duration-300" />
          </div>
          <p id="emailError" class="text-error text-xs mt-1 hidden">Please enter a valid email address.</p>
        </div>

        <!-- Password Field -->
        <div class="form-control w-full">
          <span class="label-text text-slate-300 font-medium text-sm">Password</span>
          <div class="relative input-glow rounded-lg">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-500" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </span>
            <input type="password" id="password" name="password" placeholder="••••••••" required
              autocomplete="current-password"
              class="input input-bordered w-full pl-10 pr-12 bg-slate-800/60 border-slate-700 text-white placeholder:text-slate-500 focus:outline-none transition-colors duration-300" />

            <button type="button" id="togglePassword"
              class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-500 hover:text-indigo-400 transition-colors duration-200"
              aria-label="Toggle password visibility">
            </button>
          </div>
          <p id="passwordError" class="text-error text-xs mt-1 hidden">Password is required.</p>
        </div>

        <!-- Show Password Checkbox -->
        <div class="form-control">
          <input type="checkbox" id="showPasswordCheckbox"
            class="checkbox checkbox-sm checkbox-primary border-slate-600" />
          <span class="label-text text-slate-400 text-sm select-none">Show Password</span>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="loginBtn"
          class="btn btn-primary w-full text-base font-semibold tracking-wide bg-gradient-to-r from-indigo-500 to-purple-600 border-none hover:from-indigo-600 hover:to-purple-700 shadow-lg shadow-indigo-500/25 hover:shadow-indigo-500/40 transition-all duration-300 hover:-translate-y-0.5 active:translate-y-0">
          Sign In
        </button>
      </form>

      <!-- Divider & Links -->
      <div class="divider text-slate-600 text-xs mt-6 mb-4">OR</div>

      <div class="text-center space-y-2">
        <p class="text-slate-400 text-sm">
          Don't have an account?
          <a href="registration/register.html" class="link link-primary font-semibold hover:text-indigo-300 transition-colors duration-200">Create one</a>
        </p>

        <!-- this forget_password is not implemented yet -->
        <a href="forgot_password.html"
          class="link link-secondary text-xs hover:text-purple-300 transition-colors duration-200">Forgot your
          password?</a>
      </div>
    </div>

    <!-- Footer -->
    <p class="text-center text-slate-600 text-xs mt-6">&copy; 2026 JobPortal. All rights reserved.</p>
  </main>

  <!-- External JS -->
  <!-- Removed script.js as it was unnecessary -->
</body>

</html>
